# Single founder of a pre-IPO California C corp. Two QSBS lots held:
#   (a) Pre-OBBBA lot issued 2022-03 under prior §1202 rules ($10M cap,
#       $50M gross assets, strict 5-year hold for 100% exclusion).
#   (b) Post-OBBBA lot issued 2025-09 under P.L. 119-21 §70431 rules
#       (tiered exclusion at 3/4/5 years, $15M cap, $75M gross assets).
# Triggers QSBS holding-period tiering, pre-OBBBA vs post-OBBBA tracking,
# CA nonconformity, gift-and-stack planning analysis, and §1045 rollover
# consideration. Planning horizon is 3-5 years toward a liquidity event.

