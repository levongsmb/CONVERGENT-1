    short_label: "Holding period tracking — pre-OBBBA 5-year rule / post-OBBBA 3/4/5-year tiers"
    obbba_touched: true
    priority_score: 8
    statutory_cite: "IRC §1202(a) and (b)(4) as amended by OBBBA §70431"
    detailed_description: "Pre-OBBBA QSBS (stock issued on or before July 4, 2025): strict 5-year hold required for 100% exclusion. Post-OBBBA QSBS (stock issued after July 4, 2025): tiered exclusion at 50% (3-year hold), 75% (4-year hold), 100% (5-year hold). Track holding periods separately for pre- and post-OBBBA lots; tacking rules apply to gifts and reorganizations."
