  - code: QBI_199AI_MINIMUM
    short_label: "§199A(i) minimum deduction ($400 floor if aggregate active QBI at least $1,000)"
    obbba_touched: true
    statutory_cite: "IRC §199A(i) as added by OBBBA"
    detailed_description: "Starting tax year 2026, taxpayer with at least $1,000 aggregate qualified business income from active trades or businesses in which taxpayer materially participates receives greater of computed QBI deduction or $400. Both $1,000 threshold and $400 minimum indexed for inflation after 2026."
  - code: QBI_OBBBA_PHASEIN
    short_label: "OBBBA expanded phase-in thresholds ($75K single / $150K joint above threshold)"
    obbba_touched: true
    statutory_cite: "IRC §199A(b)(3) as amended by OBBBA"
