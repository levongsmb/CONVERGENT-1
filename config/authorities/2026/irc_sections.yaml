  "1062":
    canonical_cite: "IRC §1062"
    full_cite: "Internal Revenue Code §1062 (Qualified Farmland Four-Year Installment Election)"
    last_major_amendment: "P.L. 119-21 (OBBBA — new section)"
    amendment_effective_date: "2025-07-04"
    permanence_status: "permanent"
    note: |
      §1062 is not a §453 installment sale. Gain is recognized in full in the
      year of sale. The tax liability attributable to the qualified farmland
      gain is paid in four equal annual installments; first installment due
      with the return for year of sale (original due date, no extension).
      See Notice 2026-3 for §6654 and §6655 estimated tax relief.
    related_regs: []
    key_subsections:
      - {id: "1062(a)", description: "Election mechanism"}
      - {id: "1062(b)", description: "Qualified farmland definition"}
      - {id: "1062(c)", description: "Qualified farmer definition"}

