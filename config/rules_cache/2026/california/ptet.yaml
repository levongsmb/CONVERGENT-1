    retrieved_at: 2026-04-18
    verification_status: verified_by_cpa
    verified_at: 2026-04-18
    notes: "9.3% rate confirmed in Decision 0004 sign-off."

  - coordinate: { tax_year: 2026, sub_parameter: "credit_treatment" }
    value: "NONREFUNDABLE_5YR_CARRYFORWARD"
    unit: ENUM
    authority_kind: PL
    authority_citation: "SB 132"
    retrieved_at: 2026-04-18
    verification_status: verified_by_cpa
    verified_at: 2026-04-18

  # -------------------------------------------------------------------
  # Election / deadline structure — REPLACES the prior single
  # `election_deadline` field per Decision 0004.
  # -------------------------------------------------------------------

  - coordinate: { tax_year: 2026, sub_parameter: "election_and_balance_due_date" }
    value: "ORIGINAL_DUE_DATE_OF_ENTITY_RETURN"
    unit: ENUM
    authority_kind: PL
    authority_citation: "SB 132"
    retrieved_at: 2026-04-18
    verification_status: verified_by_cpa
    verified_at: 2026-04-18
    notes: >
      Form 3804 is filed with the timely-filed original return of the
      electing entity. Calendar-year PTEs: March 15. Fiscal-year
      filers: original due date of Form 565 / 568 / 100S. Balance of
      PTE elective tax is due with the return.

  - coordinate: { tax_year: 2026, sub_parameter: "election_minimum_prepayment_date" }
    value: "06-15"
    unit: DATE_MMDD
    authority_kind: PL
    authority_citation: "SB 132"
    retrieved_at: 2026-04-18
    verification_status: verified_by_cpa
    verified_at: 2026-04-18

  - coordinate: { tax_year: 2026, sub_parameter: "election_minimum_prepayment_amount_rule" }
    value: "GREATER_OF_50PCT_PRIOR_YEAR_PTET_OR_1000"
    unit: ENUM
    authority_kind: PL
    authority_citation: "SB 132"
    retrieved_at: 2026-04-18
    verification_status: verified_by_cpa
    verified_at: 2026-04-18
    notes: >
      June 15 minimum prepayment equals the greater of 50% of prior
      year PTET or $1,000.

  - coordinate: { tax_year: 2026, sub_parameter: "election_minimum_prepayment_floor" }
    value: 1000
    unit: USD
    authority_kind: PL
    authority_citation: "SB 132"
    retrieved_at: 2026-04-18
    verification_status: verified_by_cpa
    verified_at: 2026-04-18

  - coordinate: { tax_year: 2026, sub_parameter: "election_minimum_prepayment_pct_of_prior_year" }
    value: 0.50
    unit: RATIO
    authority_kind: PL
    authority_citation: "SB 132"
    retrieved_at: 2026-04-18
    verification_status: verified_by_cpa
    verified_at: 2026-04-18

  # -------------------------------------------------------------------
  # June 15 shortfall credit-reduction mechanic.
  # Per Decision 0004: 12.5% of the SHORTFALL AMOUNT (not pro rata
  # of unpaid amount). Example: required $100,000, paid $60,000 →
  # shortfall $40,000 → credit reduction $5,000.
  # -------------------------------------------------------------------

  - coordinate: { tax_year: 2026, sub_parameter: "june15_shortfall_invalidates_election" }
    value: false
    unit: BOOL
    authority_kind: PL
    authority_citation: "SB 132"
    retrieved_at: 2026-04-18
    verification_status: verified_by_cpa
    verified_at: 2026-04-18

  - coordinate: { tax_year: 2026, sub_parameter: "june15_shortfall_credit_reduction_basis" }
    value: "SHORTFALL_AMOUNT"
    unit: ENUM
    authority_kind: PL
    authority_citation: "SB 132"
    retrieved_at: 2026-04-18
    verification_status: verified_by_cpa
    verified_at: 2026-04-18
    notes: >
      Credit reduction is computed on the shortfall amount (the unpaid
      portion of the June 15 minimum payment), measured as of the return
      filing date. NOT a pro rata allocation across qualified taxpayers.

  - coordinate: { tax_year: 2026, sub_parameter: "june15_shortfall_credit_reduction_pct" }
    value: 0.125
    unit: RATIO
    authority_kind: PL
    authority_citation: "SB 132"
    retrieved_at: 2026-04-18
    verification_status: verified_by_cpa
    verified_at: 2026-04-18

  - coordinate: { tax_year: 2026, sub_parameter: "june15_shortfall_credit_reduction_measurement_date" }
    value: "RETURN_FILING_DATE"
    unit: ENUM
    authority_kind: PL
    authority_citation: "SB 132"
    retrieved_at: 2026-04-18
    verification_status: verified_by_cpa
    verified_at: 2026-04-18

