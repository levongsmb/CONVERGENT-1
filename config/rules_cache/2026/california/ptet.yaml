# California Pass-Through Entity Tax — 2026–2030 regime under SB 132.
#
# Authority of record: SB 132 (Ch. 17, Stats. 2025, signed 2025-06-27).
# SB 132 added new RTC sections parallel to §§19900–19906 to govern the
# 2026–2030 regime. The original AB 150 framework at §§19900 et seq.
# applies to 2021–2025 tax years only — do NOT cite as primary authority
# for 2026+.
#
# Confirmed 2026-04-18 via Decision 0004 sign-off with corrections.

metadata:
  regime: "SB 132 (2026–2030)"
  jurisdiction: CA
  parameter_family: ptet_sb132
  primary_authority: "SB 132 (Ch. 17, Stats. 2025, signed 2025-06-27)"
  secondary_authority: "FTB Form 3804 Instructions (2026); FTB PTET FAQ (both update)"
  pre_2026_regime_citation: "CA R&TC §§ 19900–19906 (AB 150, applies 2021–2025)"
  signoff_companion: "ptet.yaml.SIGNOFF.md"

parameters:

  - coordinate: { tax_year: 2026, sub_parameter: "regime" }
    value: "SB132_2026_2030"
    unit: ENUM
    authority_kind: PL
    authority_citation: "SB 132 (Ch. 17, Stats. 2025)"
    retrieved_at: 2026-04-18
    verification_status: verified_by_cpa
    verified_at: 2026-04-18
    notes: >
      Regime marker. Computations branch on this value: pre-2026 uses
      the original AB 150 framework; 2026+ uses SB 132.

  - coordinate: { tax_year: 2026, sub_parameter: "tax_rate" }
