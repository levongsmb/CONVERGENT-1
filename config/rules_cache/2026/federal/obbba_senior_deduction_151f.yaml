# IRC §151(f) — OBBBA senior deduction (temporary, 2025–2028).
# Confirmed 2026-04-18 via Decision 0001 sign-off.
#
# $6,000 per qualifying taxpayer age 65+; 6% phaseout above
# $75,000 MAGI Single / $150,000 MAGI MFJ.
# Effective taxable years 2025 through 2028 only (OBBBA sunset).

