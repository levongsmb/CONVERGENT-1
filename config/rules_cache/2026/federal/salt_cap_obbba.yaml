# IRC §164(b)(6) SALT cap — OBBBA-modified schedule.
#
# Confirmed 2026-04-18 via Decision 0001 sign-off.
# Statutory basis: IRC §164(b)(6)(B)–(D) as amended by OBBBA; P.L. 119-21.
#
# Schedule (MFJ; MFS = 1/2):
#
#   Year     Base cap   Phaseout MAGI threshold
#   ----     --------   -----------------------
#   2025     $40,000    $500,000
#   2026     $40,400    $505,000
#   2027     prior × 1.01 (each year)
#   2028     prior × 1.01
#   2029     prior × 1.01
#   2030+    REVERTS to $10,000 ($5,000 MFS)   [sunset]
#
# Phaseout: 30% of MAGI excess over threshold reduces the cap down to the
# $10,000 / $5,000 MFS floor. 2025 MFJ: MAGI of $600,000 reaches the
# floor (since $100,000 × 30% = $30,000 reduction, $40,000 − $30,000 = $10,000).

