  # SECURE 2.0 mandatory Roth catch-up trigger
  - coordinate: { tax_year: 2026, sub_parameter: "secure_2_mandatory_roth_catchup_wage_threshold" }
    value: 150000
    unit: USD
    authority_kind: IRS_NOTICE
    authority_citation: "Notice 2025-67; IRC §414(v)(7) as added by SECURE 2.0 §603"
    retrieved_at: 2026-04-18
    verification_status: verified_by_cpa
    verified_at: 2026-04-18
    notes: >
      Prior-year FICA wages > $150,000 (indexed) — catch-up must be
      Roth. Statutory baseline $145,000 under §414(v)(7)(A); 2026
      indexed value confirmed at $150,000 per Notice 2025-67.

