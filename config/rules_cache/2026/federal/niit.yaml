    verification_status: bootstrapped
    notes: >
      Trusts and estates: NIIT applies to the lesser of (A) undistributed
      net investment income or (B) excess of AGI over the dollar amount
      at which the highest §1(e) trust bracket begins. That dollar amount
      is supplied by the annual Rev. Proc. — see
      `federal/trust_brackets.yaml` (awaiting_user_input).
