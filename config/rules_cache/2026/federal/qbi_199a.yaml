# §199A QBI deduction — thresholds, phaseout widths, SSTB rules.
# OBBBA (P.L. 119-21) made §199A permanent; confirm exact indexed values.

metadata:
  section: "IRC §199A"
  jurisdiction: FED
  parameter_family: qbi_199a

