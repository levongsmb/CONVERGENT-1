  - coordinate: { tax_year: 2026, sub_parameter: "phasein_width_mfj" }
    value: 150000
    unit: USD
    authority_kind: IRC
    authority_citation: "IRC §199A(b)(3)(B)(ii) as amended by OBBBA §70431 (P.L. 119-21)"
    retrieved_at: 2026-04-18
    verified_at: 2026-04-18
    verification_status: verified_by_cpa
    notes: >
      OBBBA §70431 widened the §199A(b)(3)(B)(ii) phase-in range from
      $100,000 to $150,000 for MFJ, effective for tax years beginning
      after 12/31/2025. Width is indexed for inflation after 2026 per
      §199A(e)(2)(B).

  - coordinate: { tax_year: 2026, sub_parameter: "phasein_width_single_hoh_mfs" }
    value: 75000
    unit: USD
    authority_kind: IRC
    authority_citation: "IRC §199A(b)(3)(B)(ii) as amended by OBBBA §70431 (P.L. 119-21)"
    retrieved_at: 2026-04-18
    verified_at: 2026-04-18
    verification_status: verified_by_cpa
    notes: >
      OBBBA §70431 widened the §199A(b)(3)(B)(ii) phase-in range from
      $50,000 to $75,000 for SINGLE / HOH / MFS, effective for tax
      years beginning after 12/31/2025. Width is indexed for inflation
      after 2026 per §199A(e)(2)(B).

