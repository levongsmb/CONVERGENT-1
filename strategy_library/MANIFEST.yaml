# Convergent Strategy Library Manifest — Phase 1 opening deliverable
#
# Per §12.5 of the build prompt, the MANIFEST enumerates at minimum 120
# distinct strategy IDs across the 20 categories in §12.2. This Phase 0
# scaffold publishes the ID list only; each strategy's YAML file lands in
# Phase 1, one category at a time, reviewed by the user before advancing.
#
# Sequencing of the 20 categories is governed by Open Question Q0.6
# (priority order). The ordering below reflects the default proposal in
# Q0.6 — user re-orders during Phase 0 sign-off.
#
# Every ID is snake_case, unique across the Library, and stable once
# published. Renaming an ID is a breaking change that requires a
# decisions.md entry.

