  - coordinate: { tax_year: 2026, sub_parameter: "section_408k_sep_max_percent" }
    value: 0.25
    unit: RATIO
    authority_kind: IRC
    authority_citation: "IRC §408(k)(3)(C) — SEP contribution limit based on §404(h)(1)(C) / §415(c) (25% of compensation)"
    retrieved_at: 2026-04-18
    verification_status: bootstrapped
    notes: >
      For self-employed: 25% of net earnings from self-employment after
      deducting (a) one-half of SE tax and (b) the SEP contribution itself,
      yielding an effective 20% deduction rate on net SE earnings.

