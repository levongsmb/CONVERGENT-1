  - coordinate: { tax_year: 2026, sub_parameter: "section_414v_super_catchup_age_60_63" }
    value: null
    unit: USD
    authority_kind: IRS_NOTICE
    authority_citation: "IRS Notice 2025-XX (2026 limits) — §414(v)(2)(E) as added by SECURE 2.0 §109"
    retrieved_at: 2026-04-18
    verification_status: awaiting_user_input
    notes: >
      SECURE 2.0 §109 added the "super catch-up" for participants aged
      60–63 effective 2025 — equal to the greater of $10,000 (indexed) or
      150% of the age-50 catch-up. 2026 dollar amount from IRS Notice.

