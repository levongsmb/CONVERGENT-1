# Retirement plan limits — §402(g), §414(v), §415(c), §401(a)(17),
# §408(k), §408(p), §219, plus SECURE 2.0 super-catch-up structure.
# Annually released by IRS Notice in late October for the following year.

metadata:
  section: "IRC §§ 401, 402, 408, 414, 415, 219"
  jurisdiction: FED
  parameter_family: retirement_limits
  canonical_authority_kind: IRS_NOTICE
  canonical_authority_url_pattern: "https://www.irs.gov/pub/irs-drop/n-{YY}-{NN}.pdf"

parameters:
  # All 2026 values must come from the IRS Notice announcing 2026 limits.
  # Typical Notice cadence: "Notice 2025-XX — 2026 Limitations Adjusted as
  # Provided in Section 415(d), etc."

  - coordinate: { tax_year: 2026, sub_parameter: "section_402g_employee_elective_deferral" }
    value: null
    unit: USD
    authority_kind: IRS_NOTICE
    authority_citation: "IRS Notice 2025-XX (2026 limits) — §402(g)"
    authority_url: "https://www.irs.gov/retirement-plans/plan-participant-employee/retirement-topics-401k-and-profit-sharing-plan-contribution-limits"
    retrieved_at: 2026-04-18
    verification_status: awaiting_user_input

  - coordinate: { tax_year: 2026, sub_parameter: "section_414v_catchup_age_50" }
