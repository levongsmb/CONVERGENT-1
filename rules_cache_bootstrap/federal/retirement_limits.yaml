  - coordinate: { tax_year: 2026, sub_parameter: "secure_2_mandatory_roth_catchup_wage_threshold" }
    value: 145000
    unit: USD
    authority_kind: IRC
    authority_citation: "IRC §414(v)(7) as added by SECURE 2.0 §603"
    retrieved_at: 2026-04-18
    verification_status: bootstrapped
    notes: >
      High-earner (prior-year FICA wages > $145,000, indexed) catch-up
      contributions must be Roth. Initial threshold is statutory
      $145,000; indexing begins per §414(v)(7)(B). Confirm whether any
      2026 inflation adjustment has been announced; if not, the value
      remains $145,000. Implementation relief under Notice 2023-62
      extended the effective date to 2026; confirm no further deferral
      before relying on the 2026 effective date.
