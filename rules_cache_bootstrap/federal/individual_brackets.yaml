# IRC §1 individual ordinary income brackets — 2026.
# Source: Rev. Proc. 2025-32; IR-2025-103.
# OBBBA (P.L. 119-21) made the TCJA rate structure permanent.
# Confirmed 2026-04-18 via Decision 0001 sign-off.
#
# Single and MFJ tables are populated directly. MFS, HoH, and trusts/
# estates tables are marked `awaiting_user_input` with the explicit
# instruction to copy verbatim from the Rev. Proc. PDF to avoid
# transcription error — per user's Q0.3-style instruction.

metadata:
  section: "IRC §1"
  jurisdiction: FED
  parameter_family: individual_ordinary_brackets
  primary_authority: "Rev. Proc. 2025-32; IR-2025-103"
  statutory_basis: "IRC §1(j) as made permanent by OBBBA (P.L. 119-21)"
  signoff_companion: "individual_brackets.yaml.SIGNOFF.md"

parameters:

  - coordinate: { tax_year: 2026, filing_status: ANY, sub_parameter: "marginal_rates_ordinary" }
    value:
      - 0.10
      - 0.12
      - 0.22
      - 0.24
      - 0.32
      - 0.35
      - 0.37
    unit: RATIO
    authority_kind: IRC
    authority_citation: "IRC §1(j) as permanentized by OBBBA"
    retrieved_at: 2026-04-18
    verification_status: verified_by_cpa
    verified_at: 2026-04-18

  # Single ------------------------------------------------------------
  # Bracket breakpoints are the LOWER bounds of each bracket; the upper
  # bound is the next bracket's lower bound (or infinity for the top).

  - coordinate: { tax_year: 2026, filing_status: SINGLE, sub_parameter: "bracket_breakpoints_ordinary" }
    value:
      - { rate: 0.10, lower: 0,        upper: 12400 }
      - { rate: 0.12, lower: 12400,    upper: 50400 }
      - { rate: 0.22, lower: 50400,    upper: 105700 }
      - { rate: 0.24, lower: 105700,   upper: 201775 }
      - { rate: 0.32, lower: 201775,   upper: 256225 }
      - { rate: 0.35, lower: 256225,   upper: 640600 }
      - { rate: 0.37, lower: 640600,   upper: null }
    unit: USD
    authority_kind: REV_PROC
    authority_citation: "Rev. Proc. 2025-32 §3.01 Table (A) — Single"
    retrieved_at: 2026-04-18
    verification_status: verified_by_cpa
    verified_at: 2026-04-18

