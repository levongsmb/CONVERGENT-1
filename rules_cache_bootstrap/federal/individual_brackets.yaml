# §1 individual ordinary income brackets
# Authority of record: Rev. Proc. inflation-adjustment release for the
# planning year (typically published in late October / early November for
# the following year by IRS Notice IR-YYYY-NNN + Rev. Proc. YYYY-NN).
#
# Per Decision 0001 (Option C): values below are marked
# awaiting_user_input because confirming the exact bracket breakpoints and
# their interaction with any OBBBA-driven permanence or modification
# requires the user to supply the Rev. Proc. cite current as of the
# planning year. Placeholder shape is retained so engine wiring can be
# developed against a stable schema.

