# IRC §1202 — Qualified Small Business Stock exclusion.
#
# Two regimes must be represented and computations branch on issuance
# date:
#
#   - pre-OBBBA regime applies to QSBS ISSUED ON OR BEFORE 2025-07-04.
#     $10,000,000 / 10× basis cap; $50,000,000 gross-assets ceiling;
#     5-year hold for 100% exclusion (for post-2010 issuances at 100%).
#
#   - OBBBA regime applies to QSBS ISSUED AFTER 2025-07-04.
#     $15,000,000 / 10× basis cap (indexed from 2027); $75,000,000
#     gross-assets ceiling (indexed from 2027); phased exclusion
#     (50% / 75% / 100% at 3 / 4 / 5 years).
#
# Confirmed 2026-04-18 via Decision 0001 sign-off.

