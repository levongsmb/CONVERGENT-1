# OBBBA Interpretive Notices — Phase 0 snapshot enumeration.
# Per Decision 0003: the bootstrap captures every Notice citing Public
# Law 119-21 published prior to the build snapshot date.
#
# This file is the authoritative list of which Notices are in the Day-1
# authority cache. The user confirms the list during Phase 0 sign-off
# (Open Question Q0.2).

metadata:
  snapshot_date: 2026-04-18
  public_law: "P.L. 119-21 (OBBBA — One Big Beautiful Bill Act)"
  irs_landing_url: "https://www.irs.gov/tax-reform/one-big-beautiful-bill-provisions"
  govinfo_public_law_url_pattern: "https://www.govinfo.gov/content/pkg/PLAW-119publ21/pdf/PLAW-119publ21.pdf"

notices:
  # Phase 0 ships this list empty of specific Notices. The user or
  # Statutory Mining bootstrap run populates with every OBBBA
  # interpretive Notice published as of 2026-04-18. Each entry takes
  # this shape:
  #
  # - notice_number: "2026-XX"
  #   released_at: YYYY-MM-DD
  #   title: "..."
  #   affected_code_sections: ["§199A", "§461(l)", ...]
  #   summary: "One-paragraph summary."
  #   full_text_url: "https://www.irs.gov/pub/irs-drop/n-YY-XX.pdf"
  #   verification_status: awaiting_user_input

  - notice_number: null
    verification_status: awaiting_user_input
    notes: >
      Open Question Q0.2: scope confirmation. Default proposal is to
      enumerate every IRS Notice citing P.L. 119-21 published prior to
      2026-04-18. User confirms scope or narrows to specific Code
      sections (e.g., §199A, §461(l), §1202, §164(b)(6)/SALT) before
      Statutory Mining bootstrap runs.
