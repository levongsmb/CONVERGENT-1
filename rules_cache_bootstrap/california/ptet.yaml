# California Pass-Through Entity Tax (AB 150) — 2026+ controlling rule.
#
# Per §11 of the build prompt, verbatim:
# "Current FTB rule controlling 2026 and beyond — bake into all PTET logic,
# do not regress to pre-2026 treatment: for taxable years beginning on or
# after January 1, 2026 and before January 1, 2031, a missed or short
# June 15 prepayment does not invalidate the election. The qualifying
# entity may still make a valid PTET election for the year; however, the
# qualified taxpayer's PTET credit is reduced by 12.5% of the pro rata
# share of the unpaid amount that was due on June 15. The PTET credit is
# nonrefundable at the qualified-taxpayer level, and any unused portion
# carries forward five taxable years."
#
# Decision 0004 — user must confirm:
# (i) parameters exactly as stated in §11
# (ii) March 15 election/filing deadline posture
# (iii) authority cite of record (RTC §§ 19900 et seq. + Form 3804
#      Instructions + FTB PTET FAQ, or a different cite)

